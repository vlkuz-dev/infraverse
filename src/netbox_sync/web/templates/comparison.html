{% extends "base.html" %}

{% block title %}Comparison - NetBox Sync{% endblock %}

{% block content %}
<h1>Infrastructure Comparison</h1>

<section class="comparison-controls">
    <form hx-get="/comparison" hx-target="#comparison-results" hx-push-url="false">
        <label>Provider:
            <input type="text" name="provider" value="{{ filters.provider }}" placeholder="e.g. yandex-cloud">
        </label>
        <label>Status:
            <select name="status">
                <option value="all" {% if filters.status == 'all' %}selected{% endif %}>All</option>
                <option value="discrepancies" {% if filters.status == 'discrepancies' %}selected{% endif %}>Only discrepancies</option>
            </select>
        </label>
        <label>Search:
            <input type="text" name="search" value="{{ filters.search }}" placeholder="VM name...">
        </label>
        <button type="submit">Filter</button>
    </form>
    <button hx-get="/comparison?provider={{ filters.provider }}&status={{ filters.status }}&search={{ filters.search }}" hx-target="#comparison-results" class="refresh-btn">Refresh</button>
</section>

<section class="comparison-summary">
    <p>Total: {{ summary.total }} | In sync: {{ summary.in_sync }} | With discrepancies: {{ summary.with_discrepancies }}</p>
</section>

<div id="comparison-results">
    {% include "comparison_table.html" %}
</div>
{% endblock %}
