# Infraverse Configuration File
#
# This file defines tenants, cloud accounts, monitoring, and OIDC settings.
# Credentials use ${ENV_VAR} syntax and are expanded from environment variables.
#
# Usage:
#   infraverse sync --config config.yaml
#   infraverse serve --config config.yaml

# =============================================================================
# Tenants and Cloud Accounts
# =============================================================================
# Each tenant represents a customer or organization.
# Each tenant has one or more cloud accounts.
# Supported providers: yandex_cloud, vcloud

tenants:
  acme-corp:
    description: "ACME Corporation"
    cloud_accounts:
      # Yandex Cloud account — service account key (recommended for long-lived auth)
      # Generate with: yc iam key create --service-account-name my-sa --output sa-key.json
      - name: "acme-yandex-prod"
        provider: yandex_cloud
        sa_key_file: "${YC_SA_KEY_FILE_ACME}"

      # Yandex Cloud account — plain OAuth/IAM token (shorter-lived alternative)
      # - name: "acme-yandex-dev"
      #   provider: yandex_cloud
      #   token: "${YC_TOKEN_ACME}"

      # vCloud Director account — requires url, username, password, org
      - name: "acme-vcloud"
        provider: vcloud
        url: "https://vcd.example.com"
        username: "admin"
        password: "${VCD_PASSWORD_ACME}"
        org: "acme-org"

  beta-inc:
    description: "Beta Inc"
    cloud_accounts:
      - name: "beta-yandex"
        provider: yandex_cloud
        sa_key_file: "${YC_SA_KEY_FILE_BETA}"

# =============================================================================
# Monitoring (optional)
# =============================================================================
# Zabbix configuration for per-VM monitoring checks.
# When configured, each known VM is queried in Zabbix by name (then IP fallback).
# Omit this section to skip monitoring checks entirely.

# monitoring:
#   zabbix:
#     url: "https://zabbix.example.com"
#     username: "api_user"
#     password: "${ZABBIX_PASSWORD}"

# =============================================================================
# OIDC Authentication (optional)
# =============================================================================
# OpenID Connect configuration for SSO.
# When configured, all web routes require authentication.
# Omit this section to run without authentication.
#
# Supported providers: Keycloak, Google Workspace, Azure AD, or any OIDC provider.
# Redirect URI to register: https://<your-host>/auth/callback

# oidc:
#   provider_url: "https://keycloak.example.com/realms/infraverse"
#   client_id: "infraverse"
#   client_secret: "${OIDC_CLIENT_SECRET}"
#   required_role: "infraverse-admin"

# =============================================================================
# Monitoring Exclusions (optional)
# =============================================================================
# VMs matching these rules are marked as monitoring-exempt and excluded from
# "missing from monitoring" reports. Each rule must have at least name_pattern
# or status, and a non-empty reason.

# monitoring_exclusions:
#   - name_pattern: "cl1*"
#     reason: "K8s worker nodes monitored via Prometheus"
#   - status: "stopped"
#     reason: "Intentionally stopped VMs don't need monitoring"
#   - name_pattern: "*-template"
#     reason: "VM templates are not real instances"

# =============================================================================
# Database (optional)
# =============================================================================
# Connection URL for the application database.
# Default: sqlite:///infraverse.db

# database_url: "sqlite:///infraverse.db"

# =============================================================================
# NetBox Sync (optional)
# =============================================================================
# NetBox API credentials for syncing cloud VMs to NetBox.
# Omit this section to skip NetBox sync entirely.

# netbox:
#   url: "https://netbox.example.com/api"
#   token: "${NETBOX_TOKEN}"

# =============================================================================
# Scheduler (optional)
# =============================================================================
# Background ingestion interval in minutes. 0 = disabled (default).

# sync_interval_minutes: 30

# =============================================================================
# External Links (optional)
# =============================================================================
# URL templates for detail page links. Use {placeholder} for dynamic values.

# external_links:
#   yc_console_url: "https://console.yandex.cloud/folders/{folder_id}/compute/instances/{vm_id}"
#   zabbix_host_url: "{zabbix_url}/hosts.php?form=update&hostid={host_id}"
#   netbox_vm_url: "{netbox_url}/virtualization/virtual-machines/{vm_id}/"

# =============================================================================
# Logging (optional)
# =============================================================================
# Log level: DEBUG, INFO, WARNING, ERROR. Default: INFO.

# log_level: "INFO"

# =============================================================================
# Timezone (optional)
# =============================================================================
# Timezone offset for the web UI timestamps.
# label is auto-generated from offset if omitted (e.g. "UTC+3").

# timezone:
#   offset_hours: 3
#   label: "MSK"
